services:

  # ── Infrastructure ──────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: shopuser
      POSTGRES_PASSWORD: shoppass
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopuser -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: shopuser
      RABBITMQ_DEFAULT_PASS: shoppass
    ports:
      - "5672:5672"
      - "15672:15672"   # management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  jaeger:
    image: jaegertracing/jaeger:latest
    ports:
      - "16686:16686"   # Jaeger UI
      - "4318:4318"     # OTLP HTTP

  # ── Backend services ─────────────────────────────────────────────

  user-service:
    build: ./backend/user-service
    environment:
      DATABASE_URL: postgresql+asyncpg://shopuser:shoppass@postgres:5432/users_db
      JWT_SECRET: dev-secret-change-in-prod
      OTLP_ENDPOINT: http://jaeger:4318/v1/traces
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  product-service:
    build: ./backend/product-service
    environment:
      DATABASE_URL: postgresql+asyncpg://shopuser:shoppass@postgres:5432/products_db
      OTLP_ENDPOINT: http://jaeger:4318/v1/traces
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  order-service:
    build: ./backend/order-service
    environment:
      DATABASE_URL: postgresql+asyncpg://shopuser:shoppass@postgres:5432/orders_db
      RABBITMQ_URL: amqp://shopuser:shoppass@rabbitmq:5672/
      PRODUCT_SERVICE_URL: http://product-service:8002
      OTLP_ENDPOINT: http://jaeger:4318/v1/traces
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  celery-worker:
    build: ./backend/order-service
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: postgresql+asyncpg://shopuser:shoppass@postgres:5432/orders_db
      RABBITMQ_URL: amqp://shopuser:shoppass@rabbitmq:5672/
      PRODUCT_SERVICE_URL: http://product-service:8002
      OTLP_ENDPOINT: http://jaeger:4318/v1/traces
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  notification-service:
    build: ./backend/notification-service
    environment:
      RABBITMQ_URL: amqp://shopuser:shoppass@rabbitmq:5672/
      OTLP_ENDPOINT: http://jaeger:4318/v1/traces
    ports:
      - "8004:8004"
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  api-gateway:
    build: ./backend/api-gateway
    environment:
      JWT_SECRET: dev-secret-change-in-prod
      USER_SERVICE_URL: http://user-service:8001
      PRODUCT_SERVICE_URL: http://product-service:8002
      ORDER_SERVICE_URL: http://order-service:8003
      NOTIFICATION_SERVICE_URL: http://notification-service:8004
      OTLP_ENDPOINT: http://jaeger:4318/v1/traces
    ports:
      - "8000:8000"
    depends_on:
      - user-service
      - product-service
      - order-service
      - notification-service
    restart: unless-stopped

  # ── Frontend ──────────────────────────────────────────────────────

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
    restart: unless-stopped

volumes:
  postgres_data:
