replicaCount: 2

image:
  repository: shop/order-service
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8003

healthPath: /health

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: true
  minAvailable: 1

serviceMonitor:
  enabled: true
  interval: 30s

config:
  PRODUCT_SERVICE_URL: "http://product-service"
  OTLP_ENDPOINT: "http://jaeger:4318/v1/traces"

secret:
  DATABASE_URL: ""
  RABBITMQ_URL: ""

# Celery worker — runs the same image with a different command
celeryWorker:
  enabled: true
  replicaCount: 2
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
