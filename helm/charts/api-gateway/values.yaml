replicaCount: 2

image:
  repository: shop/api-gateway
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

healthPath: /health

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: true
  minAvailable: 1

serviceMonitor:
  enabled: true
  interval: 30s

config:
  USER_SERVICE_URL: "http://user-service"
  PRODUCT_SERVICE_URL: "http://product-service"
  ORDER_SERVICE_URL: "http://order-service"
  NOTIFICATION_SERVICE_URL: "http://notification-service"
  OTLP_ENDPOINT: "http://jaeger:4318/v1/traces"

secret:
  JWT_SECRET: ""
