replicaCount: 2

image:
  repository: shop/notification-service
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8004

# Router prefix moves the health check path
healthPath: /notifications/health

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: true
  minAvailable: 1

serviceMonitor:
  enabled: true
  interval: 30s

config:
  OTLP_ENDPOINT: "http://jaeger:4318/v1/traces"

secret:
  RABBITMQ_URL: ""
